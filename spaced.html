<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spaced — Can you remember space?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --canvas-bg: #F5F5F5;
    --artboard-bg: #FFFFFF;
    --ink: #1E1E1E;
    --mid: #8E8E8E;
    --line: #E5E5E5;
    --accent-blue: #0D99FF;
    --accent-blue-bg: rgba(13, 153, 255, 0.15);
    --accent-red: #F24822;
    --accent-green: #14AE5C;
    --mono: 'DM Mono', monospace;
    --serif: 'Playfair Display', serif;
  }

  body {
    background-color: var(--canvas-bg);
    color: var(--ink);
    font-family: var(--mono);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 0;
    background-image: radial-gradient(var(--line) 1px, transparent 0);
    background-size: 20px 20px;
    background-position: center;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: none;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
    border-bottom: 1px solid var(--line);
    background: var(--canvas-bg);
    flex-shrink: 0;
    position: relative;
    z-index: 20;
  }

  .logo {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent-blue);
    font-style: italic;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
  }

  /* MAIN CONTAINER */
  .game-wrap {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
  }

  #startScreen.game-wrap {
    max-width: none;
    padding: 0;
  }

  #gameArea {
    max-width: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #startScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* TOOLBAR / ROUND INDICATOR */
  .toolbar {
    display: flex;
    gap: 0;
    border: none;
    border-bottom: 1px solid var(--line);
    background: var(--artboard-bg);
    margin-bottom: 0;
    flex-shrink: 0;
    position: relative;
    z-index: 20;
  }

  .round-pip {
    height: 6px;
    flex: 1;
    background: transparent;
    border-right: 1px solid var(--line);
    box-shadow: inset 0 -1px 0 var(--line);
    transition: background 0.2s ease;
  }

  .round-pip:last-child { border-right: none; }
  .round-pip.done { background: var(--line); }
  .round-pip.active { background: var(--accent-blue); box-shadow: none; }

  /* PHASE LABEL */
  .phase-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 0;
    padding: 10px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--canvas-bg);
    transition: background 0.3s ease;
    z-index: 20;
    position: relative;
  }

  .phase-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .phase-label.active-phase { color: var(--accent-blue); }
  .phase-label.active-phase::after { background: var(--accent-blue); }
  .phase-label.guess-phase { color: var(--accent-red); }
  .phase-label.guess-phase::after { background: var(--accent-red); }

  .timer-count {
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 40px;
    text-align: right;
  }


  /* STAGE CARD */
  .stage-card {
    background: var(--artboard-bg);
    border: none;
    padding: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .frame-label {
    position: absolute;
    top: 12px;
    left: 40px;
    font-size: 11px;
    color: var(--mid);
    font-weight: 500;
    font-family: var(--mono);
    z-index: 2;
  }

  .stage-card.revealed::after {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border: 1px solid var(--accent-blue);
    pointer-events: none;
    z-index: 10;
  }

  /* THE SPECIMEN */
  .specimen {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    min-height: 0;
  }

  /* Top half — top text sticks to the bottom edge (= card vertical center) */
  .specimen-top-area {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 0;
  }

  /* Bottom half — gap and bottom text flow downward from center */
  .specimen-bottom-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  .specimen-line {
    font-family: var(--serif);
    font-size: clamp(48px, 6vw, 120px);
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
    white-space: nowrap;
  }

  .specimen-gap {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .gap-visual {
    width: 40%;
    background: var(--accent-blue-bg);
    border: 1px solid rgba(13, 153, 255, 0.5);
    border-left: none;
    border-right: none;
    transition: height 0.06s linear;
    position: relative;
  }

  .gap-visual::before, .gap-visual::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: white;
    border: 1px solid var(--accent-blue);
    left: 50%;
    transform: translateX(-50%);
  }
  .gap-visual::before { top: -3px; }
  .gap-visual::after { bottom: -3px; }


  /* TIMER BAR */
  .timer-track {
    height: 2px;
    background: var(--line);
    margin: 0;
    overflow: hidden;
    opacity: 0;
    position: relative;
    flex-shrink: 0;
  }

  .timer-track.active { opacity: 1; }

  .timer-fill {
    height: 100%;
    background: var(--accent-blue);
    width: 100%;
  }

  .timer-track.guess-phase .timer-fill {
    background: var(--accent-red);
  }

  /* CONTROLS — overlay pinned to bottom of stage card */
  .controls {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    flex-direction: column;
    background: var(--artboard-bg);
    border-top: 1px solid var(--line);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
  }

  .controls-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid);
    padding: 12px 48px;
    border-bottom: 1px solid var(--line);
  }

  .controls-body {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 20px 48px;
    gap: 24px;
  }

  .controls-body .control-row {
    flex: 1;
    margin-bottom: 0;
  }

  .controls-body .btn {
    width: auto;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 12px 32px;
  }

  .controls.active {
    display: flex;
    opacity: 1;
    pointer-events: all;
  }

  /* gap-visual in guess mode */
  .gap-visual.guessing {
    background: rgba(242, 72, 34, 0.08);
    border-color: rgba(242, 72, 34, 0.4);
    transition: height 0.05s ease;
  }

  .gap-visual.guessing::before,
  .gap-visual.guessing::after {
    border-color: var(--accent-red);
  }

  .control-row {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    gap: 16px;
  }

  .control-label-text {
    font-size: 12px;
    color: var(--mid);
    width: 60px;
  }

  .val-input {
    width: 64px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 6px 8px;
    text-align: right;
    outline: none;
  }

  .val-input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 1px var(--accent-blue);
  }

  .slider-wrap {
    flex: 1;
    position: relative;
    padding: 0 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--artboard-bg);
    border: 2px solid var(--ink);
    border-radius: 50%;
    cursor: grab;
  }

  input[type=range]:active::-webkit-slider-thumb {
    cursor: grabbing;
    background: var(--accent-blue);
    border-color: var(--accent-blue);
  }


  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--artboard-bg);
    border: 1px solid var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.1s;
  }

  .btn:hover {
    background: transparent;
    color: var(--ink);
  }

  .btn:active { background: var(--line); }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-outline {
    background: transparent;
    color: var(--ink);
  }
  .btn-outline:hover {
    background: var(--ink);
    color: var(--artboard-bg);
  }

  /* RESULT BLOCK */
  .result-block {
    display: none;
    margin-top: 0;
    background: var(--artboard-bg);
    border: none;
    flex: 1;
    flex-direction: column;
    overflow-y: auto;
  }

  .result-block.show { display: flex; }

  .result-block-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid);
    padding: 12px 48px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .result-content {
    padding: 48px;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
  }

  .result-label {
    font-size: 11px;
    color: var(--mid);
  }

  .result-score {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -1px;
  }

  .result-score.good { color: var(--accent-green); }
  .result-score.ok { color: var(--accent-blue); }
  .result-score.off { color: var(--accent-red); }

  .comparison {
    display: flex;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 24px;
  }

  .comp-item {
    flex: 1;
    background: var(--artboard-bg);
    padding: 16px;
  }

  .comp-label {
    font-size: 10px;
    color: var(--mid);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .comp-bar {
    height: 12px;
    background: var(--canvas-bg);
    width: 100%;
    margin-bottom: 8px;
  }

  .comp-fill {
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }

  .comp-fill.target { background: var(--ink); }
  .comp-fill.guess { background: var(--accent-blue); }

  .comp-val {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--ink);
  }

  /* FINAL SCREEN */
  .final-screen {
    display: none;
    background: var(--artboard-bg);
    border: none;
    flex: 1;
    flex-direction: column;
    overflow-y: auto;
  }

  .final-screen.show { display: flex; }

  .final-screen-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid);
    padding: 12px 48px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .final-content {
    flex: 1;
    padding: 64px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  .final-score {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: -2px;
  }

  .final-denom {
    font-size: 12px;
    color: var(--mid);
    margin-bottom: 32px;
  }

  .final-verdict {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ink);
    margin: 0 auto 40px;
  }

  .round-breakdown {
    display: flex;
    border: 1px solid var(--line);
    margin-bottom: 32px;
  }

  .breakdown-pip {
    flex: 1;
    padding: 16px 0;
    border-right: 1px solid var(--line);
    font-size: 12px;
    text-align: center;
    background: #FAFAFA;
  }
  .breakdown-pip:last-child { border-right: none; }

  /* START SCREEN */
  .start-screen {
    flex: 1;
    background: var(--artboard-bg);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .start-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 80px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    min-height: 0;
  }


  /* INTRO SPECIMEN */
  .intro-specimen {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 56px;
    width: 100%;
  }

  .intro-top,
  .intro-mid,
  .intro-bottom {
    font-family: var(--serif);
    font-size: clamp(48px, 6vw, 120px);
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
    text-align: center;
  }

  .intro-bottom em {
    font-style: italic;
    color: var(--accent-blue);
  }

  .intro-gap-wrap {
    width: 40%;
    display: flex;
    justify-content: center;
  }

  .intro-gap {
    width: 100%;
    background: var(--accent-blue-bg);
    border: 1px solid rgba(13, 153, 255, 0.5);
    border-left: none;
    border-right: none;
    position: relative;
    height: 8px;
  }

  .intro-gap::before, .intro-gap::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: white;
    border: 1px solid var(--accent-blue);
    left: 50%;
    transform: translateX(-50%);
  }
  .intro-gap::before { top: -3px; }
  .intro-gap::after  { bottom: -3px; }

  /* MODE SELECTION */
  .mode-select-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--mid);
    margin-bottom: 8px;
    text-align: left;
    width: 100%;
    max-width: 480px;
  }

  .mode-select {
    display: flex;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 16px;
    width: 100%;
    max-width: 480px;
  }

  .mode-btn {
    flex: 1;
    padding: 16px 8px;
    background: var(--artboard-bg);
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: background 0.1s, color 0.1s;
    color: var(--ink);
  }

  .mode-btn:hover { background: var(--canvas-bg); }

  .mode-btn.selected {
    background: var(--ink);
    color: var(--artboard-bg);
  }

  .mode-btn .mode-name {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .mode-btn .mode-timer {
    display: block;
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  .mode-btn.selected .mode-timer {
    color: rgba(255,255,255,0.5);
  }

  .game-area { display: flex; }
  .game-area.hidden { display: none !important; }

  .mono-small {
    font-family: var(--mono);
    font-size: clamp(20px, 2.5vw, 48px);
    color: var(--mid);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sp<span>a</span>ced</div>
  <div class="tagline" id="headerTagline">Interactive Prototype</div>
</header>

<!-- START SCREEN -->
<div class="game-wrap" id="startScreen">
  <div class="start-screen">
    <div class="start-content">

      <div class="intro-specimen">
        <div class="intro-top">Can you</div>
        <div class="intro-mid">remember</div>
        <div class="intro-gap-wrap">
          <div class="intro-gap" id="introGap"></div>
        </div>
        <div class="intro-bottom"><em>space?</em></div>
      </div>

      <div class="mode-select-label">Select difficulty</div>
      <div class="mode-select">
        <button class="mode-btn" id="modeEasy" onclick="selectMode('easy')">
          <span class="mode-name">Easy</span>
          <span class="mode-timer">5s → 2s</span>
        </button>
        <button class="mode-btn" id="modeMedium" onclick="selectMode('medium')">
          <span class="mode-name">Medium</span>
          <span class="mode-timer">3s → 1s</span>
        </button>
        <button class="mode-btn" id="modeHard" onclick="selectMode('hard')">
          <span class="mode-name">Hard</span>
          <span class="mode-timer">1.5s → 0.4s</span>
        </button>
      </div>

      <button class="btn" id="startBtn" disabled onclick="startGame()" style="max-width:480px;">Start</button>
    </div>
  </div>
</div>

<!-- GAME AREA -->
<div class="game-wrap game-area hidden" id="gameArea">

  <div class="toolbar" id="roundBar"></div>

  <div class="phase-label" id="phaseLabel">
    <span id="phaseLabelText">Status: Observation</span>
    <span class="timer-count" id="timerCount"></span>
  </div>

  <!-- STAGE CARD -->
  <div class="stage-card" id="stageCard">
    <div class="frame-label" id="frameLabel"># Frame 1</div>
    <div class="specimen" id="specimen">
      <div class="specimen-top-area">
        <div class="specimen-line" id="specimenTop"></div>
      </div>
      <div class="specimen-bottom-area">
        <div class="specimen-gap">
          <div class="gap-visual" id="gapVisual"></div>
        </div>
        <div class="specimen-line mono-small" id="specimenBottom"></div>
      </div>
    </div>

    <!-- CONTROLS — overlay inside stage card -->
    <div class="controls" id="controls">
      <div class="controls-header">Properties</div>
      <div class="controls-body">
        <div class="control-row">
          <div class="control-label-text">Spacing</div>
          <div class="slider-wrap">
            <input type="range" id="gapSlider" min="4" max="80" step="1" value="4" oninput="updatePreview(this.value)">
          </div>
          <input type="text" class="val-input" id="valueInput" value="4" onchange="updateSliderFromInput(this.value)">
        </div>
        <button class="btn" onclick="submitGuess()">Commit Changes</button>
      </div>
    </div>

  </div>

  <!-- TIMER -->
  <div class="timer-track" id="timerTrack">
    <div class="timer-fill" id="timerFill"></div>
  </div>

  <!-- RESULT -->
  <div class="result-block" id="resultBlock">
    <div class="result-block-header">Inspection</div>
    <div class="result-content">
      <div class="result-row">
        <span class="result-label">Match Score</span>
        <span class="result-score" id="roundScore">—</span>
      </div>

      <div class="comparison">
        <div class="comp-item">
          <div class="comp-label">Design Spec</div>
          <div class="comp-bar">
            <div class="comp-fill target" id="targetBar" style="width:0%"></div>
          </div>
          <div class="comp-val" id="targetVal">—</div>
        </div>
        <div class="comp-item">
          <div class="comp-label">Implementation</div>
          <div class="comp-bar">
            <div class="comp-fill guess" id="guessBar" style="width:0%"></div>
          </div>
          <div class="comp-val" id="guessVal">—</div>
        </div>
      </div>

      <button class="btn btn-outline" id="btnNext" onclick="nextRound()">Next Frame</button>
    </div>
  </div>

  <!-- FINAL -->
  <div class="final-screen" id="finalScreen">
    <div class="final-screen-header">Review</div>
    <div class="final-content">
      <div class="final-score" id="finalScore">0</div>
      <div class="final-denom">/ 50.0 points</div>
      <div class="final-verdict" id="finalVerdict"></div>

      <div class="round-breakdown" id="roundBreakdown"></div>

      <button class="btn" onclick="restartGame()">Restart Prototype</button>
    </div>
  </div>

</div>

<script>
  const DISPLAY_SCALE = 4;

  // Intro gap animation
  (function animateIntroGap() {
    const el = document.getElementById('introGap');
    if (!el) return;
    const keyframes = [8, 48, 16, 72, 32, 56, 24, 80, 8];
    let idx = 0;

    function next() {
      const target = keyframes[idx % keyframes.length];
      el.style.transition = 'height 1.1s cubic-bezier(0.76, 0, 0.24, 1)';
      el.style.height = (target * 2.5) + 'px';
      idx++;
      setTimeout(next, 1600);
    }

    setTimeout(next, 400);
  })(); // visual gap = actual gap * DISPLAY_SCALE

  // GAME CONFIG
  const MODES = {
    easy: {
      label: 'Easy',
      // spread values, far apart — easy to distinguish
      pool: [7, 18, 34, 52, 67, 79, 11, 43, 60, 24],
      observeTimers: [5000, 4500, 4000, 3000, 2000],
      guessTimer: 12000,
    },
    medium: {
      label: 'Medium',
      // varied, no obvious pattern
      pool: [5, 13, 21, 30, 38, 47, 55, 63, 71, 9, 26, 44, 58, 69, 77],
      observeTimers: [3000, 2500, 2000, 1500, 1000],
      guessTimer: 8000,
    },
    hard: {
      label: 'Hard',
      // close together, clustered in the middle — hardest to distinguish
      pool: [17, 21, 26, 31, 35, 40, 44, 49, 54, 58, 63, 68, 23, 37, 51],
      observeTimers: [1500, 1000, 800, 600, 400],
      guessTimer: 5000,
    }
  };

  const ROUND_PAIRS = [
    { top: 'Headline',  bottom: 'Body text',     topSize: 32 },
    { top: 'Chapter I', bottom: 'Introduction',  topSize: 32 },
    { top: 'Title',     bottom: 'Subheading',    topSize: 32 },
    { top: 'Heading',   bottom: 'Caption text',  topSize: 32 },
    { top: 'Display',   bottom: 'Label',         topSize: 32 },
  ];

  let selectedMode = null;
  let ROUNDS = [];
  let currentRound = 0;
  let scores = [];
  let observeTimeout = null;
  let guessTimeout = null;
  let countdownInterval = null;

  function selectMode(mode) {
    selectedMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('selected');
    document.getElementById('startBtn').disabled = false;
  }

  function buildRounds() {
    const cfg = MODES[selectedMode];
    const pool = [...cfg.pool].sort(() => Math.random() - 0.5);
    // pick 5 from pool
    const gaps = pool.slice(0, 5);
    ROUNDS = ROUND_PAIRS.map((pair, i) => ({ ...pair, gap: gaps[i] }));
  }

  function startGame() {
    buildRounds();
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameArea').classList.remove('hidden');
    document.getElementById('headerTagline').textContent = MODES[selectedMode].label + ' Mode';
    buildRoundBar();
    loadRound(0);
  }

  function buildRoundBar() {
    const bar = document.getElementById('roundBar');
    bar.innerHTML = '';
    for (let i = 0; i < ROUNDS.length; i++) {
      const pip = document.createElement('div');
      pip.className = 'round-pip' + (i === 0 ? ' active' : '');
      pip.id = 'pip-' + i;
      bar.appendChild(pip);
    }
  }

  function loadRound(idx) {
    currentRound = idx;
    const round = ROUNDS[idx];

    const card = document.getElementById('stageCard');

    // Reset UI
    document.getElementById('controls').classList.remove('active');
    document.getElementById('resultBlock').classList.remove('show');
    document.getElementById('finalScreen').classList.remove('show');
    card.style.display = 'flex';
    card.classList.add('revealed');
    document.getElementById('timerTrack').style.display = '';
    document.getElementById('timerTrack').classList.remove('guess-phase');
    document.getElementById('gapVisual').classList.remove('guessing');
    stopCountdown();

    // Frame label
    document.getElementById('frameLabel').textContent = '# Frame ' + (idx + 1);

    // Round bar
    for (let i = 0; i < ROUNDS.length; i++) {
      const pip = document.getElementById('pip-' + i);
      pip.className = 'round-pip' + (i < idx ? ' done' : i === idx ? ' active' : '');
    }

    // Phase label
    const phaseLabel = document.getElementById('phaseLabel');
    document.getElementById('phaseLabelText').textContent = 'Status: Observation';
    document.getElementById('timerCount').textContent = '';
    phaseLabel.className = 'phase-label active-phase';

    // Specimen
    document.getElementById('specimenTop').textContent = round.top;
    document.getElementById('specimenBottom').textContent = round.bottom;
    document.getElementById('gapVisual').style.height = (round.gap * DISPLAY_SCALE) + 'px';

    // Reset slider to minimum
    document.getElementById('gapSlider').value = 4;
    document.getElementById('valueInput').value = 4;

    startObserveTimer();
  }

  function startCountdown(durationMs) {
    if (countdownInterval) clearInterval(countdownInterval);
    const end = Date.now() + durationMs;
    const timerCount = document.getElementById('timerCount');
    timerCount.textContent = (durationMs / 1000).toFixed(1) + 's';
    countdownInterval = setInterval(() => {
      const remaining = Math.max(0, end - Date.now());
      timerCount.textContent = (remaining / 1000).toFixed(1) + 's';
      if (remaining <= 0) clearInterval(countdownInterval);
    }, 50);
  }

  function stopCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    document.getElementById('timerCount').textContent = '';
  }

  function startObserveTimer() {
    const duration = MODES[selectedMode].observeTimers[currentRound];
    const timerTrack = document.getElementById('timerTrack');
    const timerFill = document.getElementById('timerFill');

    timerTrack.classList.add('active');
    timerFill.style.transition = 'none';
    timerFill.style.width = '100%';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        timerFill.style.transition = `width ${duration}ms linear`;
        timerFill.style.width = '0%';
      });
    });

    startCountdown(duration);

    if (observeTimeout) clearTimeout(observeTimeout);
    observeTimeout = setTimeout(() => revealGuessPhase(), duration);
  }

  function revealGuessPhase() {
    // Switch gap-visual to guess mode starting from minimum
    const gapVisual = document.getElementById('gapVisual');
    gapVisual.classList.add('guessing');
    gapVisual.style.height = (4 * DISPLAY_SCALE) + 'px';

    // Reset slider/input to minimum
    document.getElementById('gapSlider').value = 4;
    document.getElementById('valueInput').value = 4;

    document.getElementById('phaseLabelText').textContent = 'Status: Input Required';
    document.getElementById('phaseLabel').className = 'phase-label guess-phase';

    document.getElementById('controls').classList.add('active');

    startGuessTimer();
  }

  function startGuessTimer() {
    const duration = MODES[selectedMode].guessTimer;
    const timerTrack = document.getElementById('timerTrack');
    const timerFill = document.getElementById('timerFill');

    timerTrack.classList.add('guess-phase');
    timerFill.style.transition = 'none';
    timerFill.style.width = '100%';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        timerFill.style.transition = `width ${duration}ms linear`;
        timerFill.style.width = '0%';
      });
    });

    startCountdown(duration);

    if (guessTimeout) clearTimeout(guessTimeout);
    guessTimeout = setTimeout(() => submitGuess(), duration);
  }


  function updatePreview(val) {
    const clamped = Math.max(4, Math.min(80, parseInt(val) || 4));
    document.getElementById('valueInput').value = clamped;
    document.getElementById('gapSlider').value = clamped;
    document.getElementById('gapVisual').style.height = (clamped * DISPLAY_SCALE) + 'px';
  }

  function updateSliderFromInput(val) {
    updatePreview(val);
  }

  function submitGuess() {
    if (guessTimeout) clearTimeout(guessTimeout);
    stopCountdown();

    const round = ROUNDS[currentRound];
    const guess = parseInt(document.getElementById('gapSlider').value);
    const target = round.gap;

    const diff = Math.abs(guess - target);
    const maxDiff = 76; // max possible diff on free range (4 to 80)
    const rawScore = Math.max(0, 10 - (diff / maxDiff) * 10);
    const score = Math.round(rawScore * 10) / 10;

    scores.push(score);

    // Score display
    const scoreEl = document.getElementById('roundScore');
    scoreEl.textContent = score.toFixed(1);
    scoreEl.className = 'result-score ' + (score >= 8 ? 'good' : score >= 5 ? 'ok' : 'off');

    // Comparison bars
    const maxGap = 80;
    setTimeout(() => {
      document.getElementById('targetBar').style.width = (target / maxGap * 100) + '%';
      document.getElementById('guessBar').style.width = (guess / maxGap * 100) + '%';
    }, 50);

    document.getElementById('targetVal').textContent = target + 'px';
    document.getElementById('guessVal').textContent = guess + 'px';

    const isLast = currentRound === ROUNDS.length - 1;
    document.getElementById('btnNext').textContent = isLast ? 'View Report' : 'Next Frame';

    document.getElementById('controls').classList.remove('active');
    document.getElementById('timerTrack').classList.remove('active');
    document.getElementById('stageCard').style.display = 'none';
    document.getElementById('resultBlock').classList.add('show');
    document.getElementById('pip-' + currentRound).className = 'round-pip done';

    const phaseLabel = document.getElementById('phaseLabel');
    document.getElementById('phaseLabelText').textContent = 'Status: Inspecting';
    phaseLabel.className = 'phase-label';
  }

  function nextRound() {
    if (currentRound >= ROUNDS.length - 1) {
      showFinal();
    } else {
      loadRound(currentRound + 1);
    }
  }

  function showFinal() {
    document.getElementById('resultBlock').classList.remove('show');
    document.getElementById('stageCard').style.display = 'none';

    const phaseLabel = document.getElementById('phaseLabel');
    document.getElementById('phaseLabelText').textContent = 'Status: Complete';
    phaseLabel.className = 'phase-label';

    const total = scores.reduce((a, b) => a + b, 0);
    const rounded = Math.round(total * 10) / 10;

    const fScore = document.getElementById('finalScore');
    fScore.textContent = rounded.toFixed(1);

    if (rounded >= 40) fScore.style.color = 'var(--accent-green)';
    else if (rounded >= 25) fScore.style.color = 'var(--ink)';
    else fScore.style.color = 'var(--accent-red)';

    const verdicts = [
      [45, "Pixel Perfect Alignment."],
      [35, "Clean spacing. Minor deviations."],
      [25, "Draft quality. Review constraints."],
      [15, "Broken layout."],
      [0,  "CSS has crashed."]
    ];

    const verdict = verdicts.find(v => rounded >= v[0]);
    document.getElementById('finalVerdict').textContent = verdict ? verdict[1] : verdicts[verdicts.length - 1][1];

    const breakdown = document.getElementById('roundBreakdown');
    breakdown.innerHTML = '';
    scores.forEach((s, i) => {
      const pip = document.createElement('div');
      pip.className = 'breakdown-pip';
      pip.innerHTML = `<span style="color:var(--mid); font-size:10px; display:block;">F${i + 1}</span>${s.toFixed(1)}`;
      if (s >= 8) pip.style.color = 'var(--accent-green)';
      else if (s >= 5) pip.style.color = 'var(--ink)';
      else pip.style.color = 'var(--accent-red)';
      breakdown.appendChild(pip);
    });

    document.getElementById('finalScreen').classList.add('show');
  }

  function restartGame() {
    scores = [];
    buildRounds();
    document.getElementById('finalScreen').classList.remove('show');
    buildRoundBar();
    loadRound(0);
  }
</script>
</body>
</html>
