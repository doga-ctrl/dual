<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap — Align the elements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; width: 100%; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --canvas-bg: #F5F5F5;
    --artboard-bg: #FFFFFF;
    --ink: #1E1E1E;
    --mid: #8E8E8E;
    --line: #E5E5E5;
    --accent-blue: #0D99FF;
    --accent-red: #F24822;
    --accent-green: #14AE5C;
    --accent-gold: #D4AF37;
    --mono: 'DM Mono', monospace;
    --serif: 'Playfair Display', serif;
    --scene-bg:    #F5F5F5;
    --scene-color: #1E1E1E;
    --scene-dot:   rgba(30,30,30,0.12);
  }

  /* Smooth palette transitions */
  *, *::before, *::after {
    transition-property: background-color, color, border-color, outline-color;
    transition-duration: 0.5s;
    transition-timing-function: ease;
  }

  body {
    background-color: var(--scene-bg);
    color: var(--scene-color);
    font-family: var(--mono);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--scene-color);
    background-color: var(--scene-bg);
    flex-shrink: 0;
    z-index: 20;
  }

  .logo { font-family: var(--serif); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; color: var(--scene-color); }
  .logo span { color: var(--scene-color); font-style: italic; opacity: 0.5; }
  .tagline { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--scene-color); opacity: 0.45; }

  /* ── START SCREEN ── */
  #startScreen {
    flex: 1; display: flex; flex-direction: column;
    background: var(--artboard-bg); overflow: visible; min-height: 0;
  }

  .start-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 48px; min-height: 0;
    overflow: visible;
  }

  /* Intro hero */
  .intro-hero {
    width: 100%; position: relative;
    margin-bottom: 48px; flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    overflow: visible;
  }

  .intro-line {
    font-family: var(--serif);
    font-size: clamp(48px, 6vw, 120px);
    font-weight: 400; line-height: 1.1;
    color: var(--ink); text-align: center;
    white-space: nowrap; position: relative; z-index: 2;
  }

  .intro-line em { font-style: italic; color: var(--accent-blue); }

  .intro-line2 {
    position: relative;
    transition: transform 1.0s cubic-bezier(0.22, 1, 0.36, 1);
    padding-right: 0.2em; /* italic overhang compensation */
  }

  /* Guide line at center of hero */
  .intro-guide-v {
    position: absolute;
    top: 0; bottom: 0; left: 50%; width: 1px;
    border-left: 1px dashed rgba(13,153,255,0.4);
    pointer-events: none; opacity: 0;
    transition: opacity 0.4s;
  }

  .intro-guide-v.show { opacity: 1; }

  .intro-guide-lbl {
    position: absolute;
    bottom: -4px;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent-blue);
    transform: translateX(-50%);
    opacity: 0; transition: opacity 0.4s, left 0.3s ease;
    white-space: nowrap;
  }

  .intro-guide-lbl.show { opacity: 1; }

  .intro-sub {
    font-size: 12px; color: var(--mid); letter-spacing: 0.04em;
    line-height: 1.7; max-width: 380px; text-align: center; margin-bottom: 36px;
  }

  /* Mode select */
  .mode-select-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--mid); margin-bottom: 8px; width: 100%; max-width: 480px;
  }

  .mode-select {
    display: flex; gap: 1px; background: var(--line);
    border: 1px solid var(--line); margin-bottom: 16px;
    width: 100%; max-width: 480px;
  }

  .mode-btn {
    flex: 1; padding: 16px 8px; background: var(--artboard-bg);
    border: none; font-family: var(--mono); font-size: 12px;
    cursor: pointer; text-align: center; transition: background 0.1s; color: var(--ink);
  }

  .mode-btn:hover { background: var(--canvas-bg); }
  .mode-btn.selected { background: var(--ink); color: var(--artboard-bg); }
  .mode-btn .mode-name { display: block; font-size: 13px; margin-bottom: 6px; letter-spacing: 0.05em; }
  .mode-btn .mode-desc { display: block; font-size: 10px; color: var(--mid); }
  .mode-btn.selected .mode-desc { color: rgba(255,255,255,0.45); }

  .btn {
    padding: 12px 32px; background-color: var(--scene-color); color: var(--scene-bg);
    border: 1px solid var(--scene-color); font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.1em; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn:hover { background-color: transparent; color: var(--scene-color); }
  .btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
  .btn-outline { background-color: transparent; color: var(--scene-color); }
  .btn-outline:hover { background-color: var(--scene-color); color: var(--scene-bg); }

  /* ── GAME AREA ── */
  #gameArea {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }
  #gameArea.hidden { display: none !important; }

  /* Round boxes in header */
  .round-boxes { display: flex; gap: 6px; align-items: center; }
  .round-box {
    width: 10px; height: 10px;
    border: 1px solid var(--scene-color);
    opacity: 0.3;
  }
  .round-box.done   { background-color: var(--scene-color); opacity: 0.35; }
  .round-box.active { background-color: var(--scene-color); opacity: 1; }

  /* Phase label */
  .phase-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--scene-color); opacity: 0.5; padding: 10px 48px; display: flex;
    align-items: center; gap: 12px; border-bottom: 1px solid var(--scene-color);
    flex-shrink: 0; background-color: var(--scene-bg); z-index: 20;
  }
  .phase-label::after { content: ''; flex: 1; height: 1px; background: var(--scene-color); opacity: 0.3; }
  .phase-label.active { opacity: 1; }
  .timer-count {
    font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums;
    background-color: var(--scene-color); color: var(--scene-bg);
    padding: 3px 10px; letter-spacing: 0.05em; flex-shrink: 0;
  }
  .timer-count:empty { display: none; }

  /* Stage card */
  .stage-card {
    flex: 1; display: flex; flex-direction: column;
    position: relative; overflow: hidden; min-height: 0;
  }

  /* Canvas */
  .canvas-area {
    flex: 1; position: relative; overflow: hidden;
    transition: background-color 0.5s ease; min-height: 0;
  }

  /* Instruction overlay — top of canvas, prominent */
  .round-instruction {
    position: absolute;
    top: 28px;
    left: 0; right: 0;
    text-align: center;
    font-family: var(--serif);
    font-size: clamp(22px, 3.2vw, 44px);
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--scene-color);
    opacity: 0.6;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.3s;
  }
  .round-instruction.hidden { opacity: 0; }

  /* Ghost shape — slides from user pos to correct pos */
  .ghost-shape {
    position: absolute; left: 0; top: 0;
    pointer-events: none; will-change: transform;
    opacity: 0; transition: opacity 0.25s;
  }
  .ghost-shape.visible { opacity: 0.5; }
  .ghost-shape.circle  { border-radius: 50%; }
  .ghost-shape.diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
  .ghost-shape.text-el {
    background-color: transparent !important;
    font-family: var(--serif); font-size: 40px; font-weight: 700;
    letter-spacing: -0.5px; white-space: nowrap; line-height: 1;
    width: auto !important; height: auto !important;
  }

  /* Shapes — NO transform transition, direct updates only */
  .shape-el {
    position: absolute; left: 0; top: 0;
    will-change: transform;
    pointer-events: none;
  }
  .shape-el.circle  { border-radius: 50%; }
  .shape-el.diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

  /* Shape label */
  .shape-lbl {
    position: absolute;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--scene-color); opacity: 0.35;
    pointer-events: none; white-space: nowrap;
    transform: translateX(-50%);
  }

  /* Alignment guide lines — vertical (X-axis rounds) */
  .guide-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  .guide-line.show { opacity: 0.45; }
  .guide-line.target { border-left: 2px solid var(--accent-gold); }
  .guide-line.user   { border-left: 2px solid var(--accent-blue); }

  /* Alignment guide lines — horizontal (Y-axis rounds) */
  .guide-line-h {
    position: absolute; left: 0; right: 0; height: 1px;
    pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  .guide-line-h.show { opacity: 0.45; }
  .guide-line-h.target { border-top: 2px solid var(--accent-gold); }
  .guide-line-h.user   { border-top: 2px solid var(--accent-blue); }

  /* Text shape */
  .shape-el.text-el {
    background-color: transparent !important;
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    line-height: 1;
    width: auto !important;
    height: auto !important;
  }

  /* Timer bar */
  .timer-track {
    height: 5px; background: rgba(128,128,128,0.15);
    overflow: hidden; flex-shrink: 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .timer-track.active { opacity: 1; }
  .timer-fill { height: 100%; background: var(--scene-color); width: 100%; opacity: 0.7; }
  .timer-track.red .timer-fill { background: var(--accent-red); opacity: 1; }

  /* Large canvas countdown */
  .canvas-timer {
    position: absolute; bottom: 20px; right: 24px;
    font-family: var(--mono);
    font-size: clamp(80px, 16vw, 160px);
    font-weight: 300; font-variant-numeric: tabular-nums;
    color: var(--scene-color); line-height: 1; letter-spacing: -0.04em;
    opacity: 0; pointer-events: none; z-index: 5;
    transition: opacity 0.35s ease;
  }
  .canvas-timer.active { opacity: 0.18; }

  /* Controls (flex child, NOT absolute) */
  .controls {
    background-color: var(--scene-bg); border-top: 1px solid var(--scene-color);
    flex-shrink: 0; display: none;
  }
  .controls.active { display: block; }

  .ctrl-panel { display: none; }
  .ctrl-panel.active { display: block; }

  .controls-header {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--scene-color); opacity: 0.45;
    padding: 12px 48px; border-bottom: 1px solid var(--scene-color);
  }
  .controls-body {
    display: flex; align-items: center;
    padding: 18px 48px; gap: 24px;
  }
  .slider-wrap { flex: 1; padding: 0 8px; }
  .slider-lbl { font-size: 11px; color: var(--scene-color); opacity: 0.45; width: 52px; flex-shrink: 0; }

  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px;
    background: var(--scene-color); opacity: 0.35; outline: none; cursor: pointer;
    border-radius: 3px;
  }
  input[type=range]:hover, input[type=range]:focus { opacity: 0.65; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px;
    background-color: var(--scene-bg); border: 2.5px solid var(--scene-color);
    border-radius: 50%; cursor: grab; opacity: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  input[type=range]:active::-webkit-slider-thumb {
    cursor: grabbing; background-color: var(--scene-color);
  }

  /* Result panel */
  .result-header-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 48px; border-bottom: 1px solid var(--scene-color);
  }
  .result-header-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--scene-color); opacity: 0.45; }
  .result-score-inline { font-size: 24px; font-weight: 400; letter-spacing: -0.5px; }
  .result-score-inline.good { color: var(--accent-green); }
  .result-score-inline.ok   { color: var(--accent-blue); }
  .result-score-inline.off  { color: var(--accent-red); }

  .result-body {
    display: flex; align-items: flex-start;
    padding: 16px 48px; gap: 32px;
  }
  .insight-rows { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .insight-item { display: flex; justify-content: space-between; font-size: 11px; }
  .insight-key { color: var(--scene-color); opacity: 0.45; }
  .insight-val { font-variant-numeric: tabular-nums; }
  .clr-user   { color: var(--accent-blue); }
  .clr-target { color: var(--accent-gold); }

  .insight-note {
    flex: 1; font-size: 11px; color: var(--scene-color); opacity: 0.45;
    line-height: 1.65; font-style: italic; max-width: 220px;
  }

  /* Final screen */
  .final-screen {
    display: none; background-color: var(--scene-bg);
    flex: 1; flex-direction: column; overflow-y: auto;
  }
  .final-screen.show { display: flex; }
  .final-screen-header {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--scene-color); opacity: 0.45; padding: 12px 48px;
    border-bottom: 1px solid var(--scene-color); flex-shrink: 0;
  }
  .final-content {
    flex: 1; padding: 64px 24px; text-align: center;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    max-width: 640px; margin: 0 auto; width: 100%;
  }
  .final-score {
    font-size: 72px; font-weight: 300; line-height: 1;
    letter-spacing: -2px; margin-bottom: 8px;
  }
  .final-denom { font-size: 12px; color: var(--mid); margin-bottom: 32px; }
  .final-verdict { font-family: var(--serif); font-size: 20px; margin-bottom: 40px; }
  .round-breakdown {
    display: flex; border: 1px solid var(--scene-color);
    margin-bottom: 32px; width: 100%;
  }
  .breakdown-pip {
    flex: 1; padding: 16px 0; border-right: 1px solid var(--scene-color);
    font-size: 12px; text-align: center; background-color: transparent;
  }
  .breakdown-pip:last-child { border-right: none; }

  /* Hide status bar and progress bar — canvas timer is the only indicator */
  .phase-label, .timer-track { display: none !important; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    body { height: 100dvh; }
    html { height: 100dvh; }

    header { padding: 10px 16px; }
    .logo  { font-size: 22px; }
    .tagline { font-size: 10px; }

    .phase-label { padding: 8px 16px; font-size: 10px; }

    .start-content { padding: 24px 20px; }
    .intro-hero    { margin-bottom: 24px; }
    .intro-sub     { margin-bottom: 20px; font-size: 12px; }
    .intro-line    { font-size: clamp(36px, 9vw, 80px); }

    .mode-btn    { padding: 14px 6px; }
    .btn         { padding: 14px 20px; }

    input[type=range] { height: 44px; }
    input[type=range]::-webkit-slider-thumb { width: 32px; height: 32px; }

    .controls-header { padding: 10px 16px; }
    .controls-body   { padding: 12px 16px; gap: 12px; }
    .slider-lbl      { font-size: 10px; width: 44px; }

    .result-header-row { padding: 10px 16px; }
    .result-body {
      padding: 12px 16px; flex-direction: column; gap: 12px;
    }
    .insight-note { max-width: none; }

    .final-screen-header { padding: 10px 16px; }
    .final-content       { padding: 32px 16px; }
    .final-score         { font-size: 56px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="logo">Sn<span>a</span>p</div>
    <div class="round-boxes" id="roundBoxes" style="display:none;"></div>
  </div>
  <div class="tagline" id="headerTagline">Design Perception Test</div>
</header>

<!-- ── START SCREEN ── -->
<div id="startScreen">
  <div class="start-content">

    <div class="intro-hero" id="introHero" style="position:relative;">
      <div class="intro-guide-v" id="introGuide"></div>
      <div class="intro-guide-lbl" id="introGuideLbl">center</div>
      <div class="intro-line" id="introLine1">Is your eye</div>
      <div class="intro-line intro-line2" id="introLine2"><em>precise enough?</em></div>

    </div>

    <div class="intro-sub">Two elements. One fixed, one yours. Move it until the edges — or centers — align. Your score measures how precisely your eye lands on the target.</div>

    <div class="mode-select-label">Select difficulty</div>
    <div class="mode-select">
      <button class="mode-btn" id="modeEasy" onclick="selectMode('easy')">
        <span class="mode-name">Easy</span>
        <span class="mode-desc">20 seconds</span>
      </button>
      <button class="mode-btn" id="modeMedium" onclick="selectMode('medium')">
        <span class="mode-name">Medium</span>
        <span class="mode-desc">12 seconds</span>
      </button>
      <button class="mode-btn" id="modeHard" onclick="selectMode('hard')">
        <span class="mode-name">Hard</span>
        <span class="mode-desc">6 seconds</span>
      </button>
    </div>

    <button class="btn" id="startBtn" disabled onclick="startGame()" style="max-width:480px;width:100%;">Begin</button>
  </div>
</div>

<!-- ── GAME AREA ── -->
<div id="gameArea" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">

  <div class="phase-label" id="phaseLabel">
    <span id="phaseTxt">Status: Align</span>
    <span class="timer-count" id="timerCount"></span>
  </div>
  <div class="timer-track" id="timerTrack">
    <div class="timer-fill" id="timerFill"></div>
  </div>

  <!-- STAGE CARD -->
  <div class="stage-card" id="stageCard">

    <!-- CANVAS -->
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-timer" id="canvasTimer"></div>
      <div class="round-instruction" id="roundInstruction"></div>
      <div class="ghost-shape" id="ghostShape"></div>
      <div class="guide-line target"   id="guideTarget"></div>
      <div class="guide-line user"     id="guideUser"></div>
      <div class="guide-line-h target" id="guideTargetH"></div>
      <div class="guide-line-h user"   id="guideUserH"></div>
      <div class="shape-el" id="fixedShape"></div>
      <div class="shape-el" id="moveShape"></div>
      <div class="shape-lbl" id="lblFixed">Fixed</div>
      <div class="shape-lbl" id="lblMove">You</div>
    </div>

    <!-- CONTROLS -->
    <div class="controls" id="controls">

      <!-- Input panel -->
      <div class="ctrl-panel active" id="ctrlInput">
        <div class="controls-body">
          <span class="slider-lbl">Position</span>
          <div class="slider-wrap">
            <input type="range" id="posSlider" min="5" max="95" step="any" value="50" oninput="onSlide()">
          </div>
          <button class="btn" onclick="submitGuess()">Commit</button>
        </div>
      </div>

      <!-- Result panel -->
      <div class="ctrl-panel" id="ctrlResult">
        <div class="result-header-row">
          <span class="result-header-lbl">Inspection</span>
          <span class="result-score-inline" id="rScore">—</span>
        </div>
        <div class="result-body">
          <div class="insight-rows" id="insightRows"></div>
          <div class="insight-note" id="insightNote"></div>
          <button class="btn btn-outline" id="btnNext" onclick="nextRound()" style="align-self:flex-end;">Next</button>
        </div>
      </div>

    </div>
  </div>

  <!-- FINAL -->
  <div class="final-screen" id="finalScreen">
    <div class="final-screen-header">Review</div>
    <div class="final-content">
      <div class="final-score" id="finalScore">0</div>
      <div class="final-denom">/ 50.0 points</div>
      <div class="final-verdict" id="finalVerdict"></div>
      <div class="round-breakdown" id="roundBreakdown"></div>
      <div style="display:flex;gap:8px;width:100%;">
        <button class="btn btn-outline" id="shareBtn" onclick="shareResult()">Share</button>
        <button class="btn" onclick="restartGame()">Restart</button>
      </div>
    </div>
  </div>

</div>

<script>
// ─── ROUND DEFS ───────────────────────────────────────────────────────────────
// axis:'x' — slider moves shape horizontally; fixedXPct positions fixed shape
// axis:'y' — slider moves shape vertically;   fixedYPct positions fixed shape
// fixedType/moveType: 'square'|'circle'|'rect-h'|'rect-v'|'text'
// For 'text' type: include fixedText/moveText string; fixedW/H and moveW/H are 0 (measured at runtime)
// alignType x: 'center'|'left'|'right'   alignType y: 'middle'|'top'|'bottom'
const ROUND_DEFS = [
  // Fixed ~108px, move ~62px — ratio ≈ 1.7x across all rounds
  {
    axis:'x', alignType:'center', alignLabel:'Align centers', alignTag:'Center',
    fixedType:'square', fixedW:108, fixedH:108, fixedXPct:40,
    moveType:'circle',  moveW:62,   moveH:62,
  },
  {
    axis:'y', alignType:'top', alignLabel:'Align top edges', alignTag:'Top Edge',
    fixedType:'rect-h', fixedW:140, fixedH:62, fixedYPct:36,
    moveType:'text',    moveText:'Grid', moveW:0, moveH:0,
  },
  {
    axis:'x', alignType:'left', alignLabel:'Align left edges', alignTag:'Left Edge',
    fixedType:'text',   fixedText:'Type', fixedW:0, fixedH:0, fixedXPct:46,
    moveType:'circle',  moveW:62,   moveH:62,
  },
  {
    axis:'y', alignType:'middle', alignLabel:'Align centers', alignTag:'Center',
    fixedType:'circle', fixedW:108, fixedH:108, fixedYPct:40,
    moveType:'square',  moveW:62,   moveH:62,
  },
  {
    axis:'x', alignType:'right', alignLabel:'Align right edges', alignTag:'Right Edge',
    fixedType:'rect-v', fixedW:62,  fixedH:140, fixedXPct:52,
    moveType:'text',    moveText:'Spec', moveW:0, moveH:0,
  },
];

const SCENES = [
  { bg: '#0A1628', color: '#E8C46A' },  // deep navy + amber gold
  { bg: '#F5EDD6', color: '#1A0800' },  // warm cream + espresso
  { bg: '#2A0A28', color: '#F0D8A8' },  // deep plum + champagne
  { bg: '#0D1F14', color: '#6FD4A8' },  // forest night + mint
  { bg: '#F4DDE4', color: '#280808' },  // blush rose + mahogany
];

const MODES = {
  easy:   { label:'Easy',   guessMs:20000 },
  medium: { label:'Medium', guessMs:12000 },
  hard:   { label:'Hard',   guessMs:6000  },
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let selectedMode = null;
let ROUNDS = [];
let currentRound = 0;
let scores = [];
let guessTimeout = null, cdInterval = null;

// ─── INTRO ANIMATION ─────────────────────────────────────────────────────────
(function introLoop() {
  const line2 = document.getElementById('introLine2');
  const guide = document.getElementById('introGuide');
  const lbl   = document.getElementById('introGuideLbl');
  if (!line2) return;

  const line1 = document.getElementById('introLine1');

  // Compute target offsets relative to line1's edges
  function getTargets() {
    const heroW  = line2.parentElement.offsetWidth;
    const line1W = line1.offsetWidth;
    const line2W = line2.offsetWidth;
    // Max safe tx: text right edge must stay within viewport
    const maxTx = Math.max(0, Math.floor(window.innerWidth / 2 - line2W / 2 - 64));
    const clamp = v => Math.max(-maxTx, Math.min(maxTx, v));
    const leftTx  = clamp((line2W - line1W) / 2);
    const rightTx = clamp((line1W - line2W) / 2);
    const line1Left  = heroW / 2 - line1W / 2;
    const line1Right = heroW / 2 + line1W / 2;
    return {
      center: { tx: 0,        guidePx: heroW / 2,  label: 'center'     },
      left:   { tx: leftTx,   guidePx: line1Left,  label: 'left edge'  },
      right:  { tx: rightTx,  guidePx: line1Right, label: 'right edge' },
    };
  }

  const PHASES = ['center', 'left', 'right'];

  let phaseIdx = 0;

  function move(x, dur) {
    return new Promise(resolve => {
      line2.style.transition = `transform ${dur}ms cubic-bezier(0.22, 1, 0.36, 1)`;
      line2.style.transform  = `translateX(${x}px)`;
      setTimeout(resolve, dur);
    });
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function runPhase() {
    const targets = getTargets();
    const key     = PHASES[phaseIdx];
    const { tx, guidePx, label } = targets[key];

    guide.classList.remove('show');
    lbl.classList.remove('show');

    // Search — overshoot then settle, clamped to viewport
    const line2W = line2.offsetWidth;
    const maxTx  = Math.floor(window.innerWidth / 2 - line2W / 2 - 24);
    const clamp  = v => Math.max(-maxTx, Math.min(maxTx, v));
    const over1  = clamp(tx + (tx >= 0 ? 38 : -38));
    const over2  = clamp(tx - (tx >= 0 ? 16 : -16));

    await move(over1,  1000);
    await wait(70);
    await move(over2,  680);
    await wait(60);
    await move(tx,     580);
    await wait(480);

    // Show guide at line1's edge
    const heroW       = line2.parentElement.offsetWidth;
    guide.style.left  = guidePx + 'px';
    lbl.style.left    = guidePx + 'px';
    lbl.textContent   = label;
    guide.classList.add('show');
    lbl.classList.add('show');

    await wait(2000);

    phaseIdx = (phaseIdx + 1) % PHASES.length;
    runPhase();
  }

  // Start
  line2.style.transition = 'none';
  line2.style.transform  = 'translateX(0)';
  setTimeout(runPhase, 600);
})();

// ─── MODE SELECT ─────────────────────────────────────────────────────────────
function selectMode(m) {
  selectedMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mode' + m[0].toUpperCase() + m.slice(1)).classList.add('selected');
  document.getElementById('startBtn').disabled = false;
}

// ─── BUILD ROUNDS ─────────────────────────────────────────────────────────────
function buildRounds() {
  ROUNDS = ROUND_DEFS.map(def => ({
    ...def,
    fixedXPct: def.fixedXPct != null ? def.fixedXPct + (Math.random() * 8 - 4) : undefined,
    fixedYPct: def.fixedYPct != null ? def.fixedYPct + (Math.random() * 8 - 4) : undefined,
  }));
}

// ─── START ────────────────────────────────────────────────────────────────────
function startGame() {
  buildRounds();
  document.getElementById('startScreen').style.display = 'none';
  const ga = document.getElementById('gameArea');
  ga.classList.remove('hidden');
  ga.style.display = 'flex';
  document.getElementById('headerTagline').textContent = MODES[selectedMode].label + ' Mode';
  buildRoundBoxes();
  loadRound(0);
}

function buildRoundBoxes() {
  const boxes = document.getElementById('roundBoxes');
  boxes.innerHTML = '';
  boxes.style.display = 'flex';
  ROUNDS.forEach((_, i) => {
    const b = document.createElement('div');
    b.className = 'round-box' + (i === 0 ? ' active' : '');
    b.id = 'pip-' + i;
    boxes.appendChild(b);
  });
}

// ─── LOAD ROUND ───────────────────────────────────────────────────────────────
function loadRound(idx) {
  currentRound = idx;
  const round = ROUNDS[idx];

  clearTimers();

  // Apply scene palette
  const scene = SCENES[idx];
  const root  = document.documentElement;
  root.style.setProperty('--scene-bg',    scene.bg);
  root.style.setProperty('--scene-color', scene.color);
  root.style.setProperty('--scene-dot',   scene.color + '1F');

  // Reset
  document.getElementById('finalScreen').classList.remove('show');
  document.getElementById('stageCard').style.display = 'flex';
  document.getElementById('timerTrack').classList.remove('active', 'red');
  ['guideTarget','guideUser','guideTargetH','guideUserH'].forEach(id =>
    document.getElementById(id).classList.remove('show'));
  const ghost = document.getElementById('ghostShape');
  ghost.className = 'ghost-shape';
  ghost.style.cssText = '';
  ghost.innerHTML = '';
  showPanel('input');
  document.getElementById('controls').classList.add('active');

  // Round boxes
  ROUNDS.forEach((_, i) => {
    document.getElementById('pip-' + i).className =
      'round-box' + (i < idx ? ' done' : i === idx ? ' active' : '');
  });

  // Phase label
  document.getElementById('phaseTxt').textContent = 'Status: Align';
  document.getElementById('phaseLabel').className = 'phase-label active';

  // Instruction overlay (big, in canvas) + slider axis label
  const instrEl = document.getElementById('roundInstruction');
  instrEl.textContent = round.alignLabel;
  instrEl.classList.remove('hidden');
  document.querySelector('.slider-lbl').textContent = round.axis === 'y' ? 'Vertical' : 'Horizontal';

  // Build shapes
  buildShapes(round);

  // Slider start — far from target
  const targetPct = computeTargetPct(round);
  const startPct  = randomFarFrom(targetPct, 8, 92);
  document.getElementById('posSlider').value = startPct;
  placeMoveShape(round, startPct);

  // Timer
  startTimer(MODES[selectedMode].guessMs);
}

// ─── SHAPES ───────────────────────────────────────────────────────────────────
function applyShape(el, type, w, h, text) {
  if (type === 'text') {
    el.className    = 'shape-el text-el';
    el.textContent  = text || '';
    el.style.width  = 'auto';
    el.style.height = 'auto';
  } else {
    el.className   = 'shape-el' + (type === 'circle' ? ' circle' : type === 'diamond' ? ' diamond' : '');
    el.textContent = '';
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  }
}

function measureEl(el) {
  const r = el.getBoundingClientRect();
  return { w: r.width, h: r.height };
}

// Returns the actual ink height of a text element using Canvas metrics.
// Avoids counting line-height whitespace above/below the glyphs.
function getInkHeight(el) {
  const s = window.getComputedStyle(el);
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  ctx.font = `${s.fontStyle} ${s.fontWeight} ${s.fontSize} ${s.fontFamily}`;
  const m = ctx.measureText(el.textContent);
  if (typeof m.actualBoundingBoxAscent === 'number') {
    return m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
  }
  // Fallback: ~72% of font-size (typical cap height ratio)
  return parseFloat(s.fontSize) * 0.72;
}

function buildShapes(round) {
  const ca = document.getElementById('canvasArea');
  const W  = ca.offsetWidth;
  const H  = ca.offsetHeight;

  const fe = document.getElementById('fixedShape');
  const me = document.getElementById('moveShape');
  const lf = document.getElementById('lblFixed');
  const lm = document.getElementById('lblMove');

  // ── Fixed element ──
  applyShape(fe, round.fixedType, round.fixedW, round.fixedH, round.fixedText);
  if (round.fixedType === 'text') {
    fe.style.color   = 'var(--scene-color)';
    fe.style.opacity = '1';
    fe.style.transform = 'translate(0,0)';
    const m = measureEl(fe);
    round.fixedW = m.w; round.fixedH = m.h;
    round.fixedAlignH = getInkHeight(fe); // actual glyph height for Y-axis alignment
  } else {
    fe.style.backgroundColor = 'var(--scene-color)';
    fe.style.opacity = '1';
    round.fixedAlignH = round.fixedH;
  }

  // ── Move element ──
  applyShape(me, round.moveType, round.moveW, round.moveH, round.moveText);
  if (round.moveType === 'text') {
    me.style.color   = 'var(--scene-color)';
    me.style.opacity = '1';
    me.style.transform = 'translate(0,0)';
    const m = measureEl(me);
    round.moveW = m.w; round.moveH = m.h;
    round.moveAlignH = getInkHeight(me); // actual glyph height for Y-axis alignment
  } else {
    me.style.backgroundColor = 'var(--scene-color)';
    me.style.opacity = '1';
    round.moveAlignH = round.moveH;
  }

  // ── Position fixed element & labels ──
  if (round.axis === 'x') {
    const fx = round.fixedXPct / 100 * W;
    const fy = H * 0.34;
    fe.style.transform = `translate(${fx}px,${fy}px) translate(-50%,-50%)`;
    lf.style.left      = fx + 'px';
    lf.style.top       = (fy - round.fixedH / 2 - 18) + 'px';
    lf.style.transform = 'translateX(-50%)';
    lm.style.transform = 'translateX(-50%)';
    lm.style.top       = (H * 0.67 + round.moveH / 2 + 8) + 'px';
    lm.style.left      = '';
  } else {
    // Y-axis: fixed on left side, move on right side
    const fx = W * 0.28;
    const fy = round.fixedYPct / 100 * H;
    fe.style.transform = `translate(${fx}px,${fy}px) translate(-50%,-50%)`;
    lf.style.left      = (fx + round.fixedW / 2 + 10) + 'px';
    lf.style.top       = fy + 'px';
    lf.style.transform = 'translateY(-50%)';
    // move label: positioned in placeMoveShape
    lm.style.transform = 'translateY(-50%)';
  }
}

function placeMoveShape(round, pct) {
  const ca = document.getElementById('canvasArea');
  const W  = ca.offsetWidth;
  const H  = ca.offsetHeight;
  const me = document.getElementById('moveShape');
  const lm = document.getElementById('lblMove');

  if (round.axis === 'x') {
    const mx = pct / 100 * W;
    const my = H * 0.67;
    me.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
    lm.style.left = mx + 'px';
    lm.style.top  = (my + round.moveH / 2 + 8) + 'px';
  } else {
    const mx = W * 0.72;
    const my = pct / 100 * H;
    me.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
    lm.style.left = (mx + round.moveW / 2 + 10) + 'px';
    lm.style.top  = my + 'px';
  }
}

function onSlide() {
  placeMoveShape(ROUNDS[currentRound], parseFloat(document.getElementById('posSlider').value));
}

// ─── TARGET ───────────────────────────────────────────────────────────────────
function computeTargetPct(round) {
  const ca = document.getElementById('canvasArea');
  const W  = ca.offsetWidth;
  const H  = ca.offsetHeight;

  if (round.axis === 'x') {
    const cx = round.fixedXPct / 100 * W;
    let tx;
    if (round.alignType === 'center') tx = cx;
    else if (round.alignType === 'left')  tx = cx - round.fixedW / 2 + round.moveW / 2;
    else                                   tx = cx + round.fixedW / 2 - round.moveW / 2;
    return (tx / W) * 100;
  } else {
    // Use ink heights (actual glyph bounds) so text shapes align on visible edges,
    // not on the inflated DOM bounding box that includes line-height whitespace.
    const fH = round.fixedAlignH ?? round.fixedH;
    const mH = round.moveAlignH  ?? round.moveH;
    const cy = round.fixedYPct / 100 * H;
    let ty;
    if (round.alignType === 'middle') ty = cy;
    else if (round.alignType === 'top')    ty = cy - fH / 2 + mH / 2;
    else                                    ty = cy + fH / 2 - mH / 2;
    return (ty / H) * 100;
  }
}

function randomFarFrom(target, min, max) {
  const sign   = Math.random() > 0.5 ? 1 : -1;
  const offset = 18 + Math.random() * 18;
  return Math.min(max, Math.max(min, target + sign * offset));
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(ms) {
  const track = document.getElementById('timerTrack');
  const fill  = document.getElementById('timerFill');
  const ct    = document.getElementById('canvasTimer');
  track.classList.add('active', 'red');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = `width ${ms}ms linear`;
    fill.style.width = '0%';
  }));
  const end = Date.now() + ms;
  const el  = document.getElementById('timerCount');
  const init = (ms / 1000).toFixed(1);
  el.textContent = init + 's';
  ct.textContent = init;
  ct.classList.add('active');
  cdInterval = setInterval(() => {
    const rem = Math.max(0, end - Date.now());
    const s = (rem / 1000).toFixed(1);
    el.textContent = s + 's';
    ct.textContent = s;
    if (rem <= 0) clearInterval(cdInterval);
  }, 50);
  guessTimeout = setTimeout(submitGuess, ms);
}

function clearTimers() {
  if (guessTimeout) clearTimeout(guessTimeout);
  if (cdInterval)   clearInterval(cdInterval);
  document.getElementById('timerCount').textContent = '';
  const ct = document.getElementById('canvasTimer');
  ct.textContent = ''; ct.classList.remove('active');
  const track = document.getElementById('timerTrack');
  track.classList.remove('active', 'red');
  document.getElementById('timerFill').style.transition = 'none';
  document.getElementById('timerFill').style.width = '100%';
}

// ─── PANEL SWITCH ─────────────────────────────────────────────────────────────
function showPanel(which) {
  document.getElementById('ctrlInput').className  = 'ctrl-panel' + (which === 'input'  ? ' active' : '');
  document.getElementById('ctrlResult').className = 'ctrl-panel' + (which === 'result' ? ' active' : '');
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function submitGuess() {
  clearTimers();

  const round     = ROUNDS[currentRound];
  const ca        = document.getElementById('canvasArea');
  const W         = ca.offsetWidth;
  const H         = ca.offsetHeight;
  const userPct   = parseFloat(document.getElementById('posSlider').value);
  const targetPct = computeTargetPct(round);

  let userEdge, targetEdge, edgeLabel, scale;

  if (round.axis === 'x') {
    const userCX   = userPct   / 100 * W;
    const targetCX = targetPct / 100 * W;
    scale = W;
    if (round.alignType === 'center') {
      userEdge = userCX; targetEdge = targetCX; edgeLabel = 'Center X';
    } else if (round.alignType === 'left') {
      userEdge = userCX - round.moveW / 2; targetEdge = targetCX - round.moveW / 2; edgeLabel = 'Left edge';
    } else {
      userEdge = userCX + round.moveW / 2; targetEdge = targetCX + round.moveW / 2; edgeLabel = 'Right edge';
    }
    // Vertical guide lines
    document.getElementById('guideTarget').style.left = targetEdge + 'px';
    document.getElementById('guideUser').style.left   = userEdge   + 'px';
    setTimeout(() => {
      document.getElementById('guideTarget').classList.add('show');
      document.getElementById('guideUser').classList.add('show');
    }, 60);
  } else {
    const userCY   = userPct   / 100 * H;
    const targetCY = targetPct / 100 * H;
    scale = H;
    const mAlignH = round.moveAlignH ?? round.moveH;
    if (round.alignType === 'middle') {
      userEdge = userCY; targetEdge = targetCY; edgeLabel = 'Center Y';
    } else if (round.alignType === 'top') {
      userEdge = userCY - mAlignH / 2; targetEdge = targetCY - mAlignH / 2; edgeLabel = 'Top edge';
    } else {
      userEdge = userCY + mAlignH / 2; targetEdge = targetCY + mAlignH / 2; edgeLabel = 'Bottom edge';
    }
    // Horizontal guide lines
    document.getElementById('guideTargetH').style.top = targetEdge + 'px';
    document.getElementById('guideUserH').style.top   = userEdge   + 'px';
    setTimeout(() => {
      document.getElementById('guideTargetH').classList.add('show');
      document.getElementById('guideUserH').classList.add('show');
    }, 60);
  }

  // 0px=10.0 · 1–3px=9.9 · then –0.1 per 5px
  const diff  = Math.abs(Math.round(userEdge) - Math.round(targetEdge));
  const score = diff === 0
    ? 10.0
    : diff <= 3
      ? 9.9
      : Math.max(0, Math.round((9.9 - Math.ceil((diff - 3) / 5) * 0.1) * 10) / 10);
  scores.push(score);

  // Score
  const sEl = document.getElementById('rScore');
  sEl.textContent = score.toFixed(1);
  // good ≤3px · ok ≤10px · off >10px
  const bucket = diff <= 3 ? 'good' : diff <= 10 ? 'ok' : 'off';
  sEl.className = 'result-score-inline ' + bucket;

  // Insight rows
  document.getElementById('insightRows').innerHTML = [
    { k: edgeLabel + ' — You',    v: Math.round(userEdge)   + 'px', c: 'clr-user'   },
    { k: edgeLabel + ' — Target', v: Math.round(targetEdge) + 'px', c: 'clr-target' },
    { k: 'Difference',            v: diff + 'px',                   c: ''            },
  ].map(r => `<div class="insight-item"><span class="insight-key">${r.k}</span><span class="insight-val ${r.c}">${r.v}</span></div>`).join('');

  const notes = {
    good: ['Pixel-precise.', 'Snapped.', 'No drift.'],
    ok:   [diff + 'px off. Nearly there.', 'Close. Minor correction needed.', 'Good instinct.'],
    off:  [diff + 'px off. The eye drifts.', 'Size difference fools the eye.', 'Distance breaks precision.'],
  };
  document.getElementById('insightNote').textContent = notes[bucket][Math.floor(Math.random() * 3)];

  const isLast = currentRound === ROUNDS.length - 1;
  document.getElementById('btnNext').textContent = isLast ? 'View Report' : 'Next Frame';

  // Ghost — slides from user position to target position
  (function() {
    const GOLD  = '#D4AF37';
    const ghost = document.getElementById('ghostShape');
    const ca    = document.getElementById('canvasArea');
    const W     = ca.offsetWidth;
    const H     = ca.offsetHeight;

    ghost.className = 'ghost-shape';
    ghost.innerHTML = '';
    if (round.moveType === 'text') {
      ghost.classList.add('text-el');
      ghost.textContent    = round.moveText || '';
      ghost.style.color    = GOLD;
    } else {
      if (round.moveType === 'circle')  ghost.classList.add('circle');
      if (round.moveType === 'diamond') ghost.classList.add('diamond');
      ghost.style.width           = round.moveW + 'px';
      ghost.style.height          = round.moveH + 'px';
      ghost.style.backgroundColor = GOLD;
    }

    let startX, startY, endX, endY;
    if (round.axis === 'x') {
      startX = userPct   / 100 * W;  startY = H * 0.67;
      endX   = targetPct / 100 * W;  endY   = H * 0.67;
    } else {
      startX = W * 0.72;  startY = userPct   / 100 * H;
      endX   = W * 0.72;  endY   = targetPct / 100 * H;
    }

    ghost.style.transition = 'none';
    ghost.style.transform  = `translate(${startX}px, ${startY}px) translate(-50%, -50%)`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      ghost.style.transition = 'opacity 0.2s';
      ghost.classList.add('visible');
      setTimeout(() => {
        ghost.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.15, 0.64, 1)';
        ghost.style.transform  = `translate(${endX}px, ${endY}px) translate(-50%, -50%)`;
      }, 200);
    }));
  })();

  document.getElementById('roundInstruction').classList.add('hidden');
  document.getElementById('pip-' + currentRound).className = 'round-box done';
  document.getElementById('phaseTxt').textContent = 'Status: Inspection';
  document.getElementById('phaseLabel').className = 'phase-label';
  showPanel('result');
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function nextRound() {
  if (currentRound >= ROUNDS.length - 1) showFinal();
  else loadRound(currentRound + 1);
}

function showFinal() {
  document.getElementById('stageCard').style.display = 'none';
  document.getElementById('phaseTxt').textContent = 'Status: Complete';
  document.getElementById('phaseLabel').className = 'phase-label';

  const total   = scores.reduce((a, b) => a + b, 0);
  const rounded = Math.round(total * 10) / 10;

  const fScore = document.getElementById('finalScore');
  fScore.textContent = rounded.toFixed(1);
  fScore.style.color = rounded >= 49 ? 'var(--accent-green)'
                     : rounded >= 47 ? 'var(--scene-color)'
                     : 'var(--accent-red)';

  // 5 rounds × 10pts. With –0.1/5px curve, scores cluster near 9.x.
  const verdicts = [
    [49.5, 'Pixel-perfect alignment.'],  // all rounds ≤3px
    [49.0, 'Clean. Barely any drift.'],  // avg ~4–8px off
    [48.0, 'Acceptable. Review your eye.'],
    [46.0, 'The grid disagrees with you.'],
    [0,    'Misaligned by design.'],
  ];
  document.getElementById('finalVerdict').textContent =
    verdicts.find(v => rounded >= v[0])?.[1] ?? verdicts[verdicts.length - 1][1];

  const bd = document.getElementById('roundBreakdown');
  bd.innerHTML = '';
  scores.forEach((s, i) => {
    const p = document.createElement('div');
    p.className = 'breakdown-pip';
    p.innerHTML = `<span style="color:var(--scene-color);opacity:0.4;font-size:10px;display:block;">F${i+1}</span>${s.toFixed(1)}`;
    p.style.color = s >= 8 ? 'var(--accent-green)' : s >= 5 ? 'var(--scene-color)' : 'var(--accent-red)';
    bd.appendChild(p);
  });

  document.getElementById('finalScreen').classList.add('show');
}

function restartGame() {
  scores = [];
  buildRounds();
  document.getElementById('finalScreen').classList.remove('show');
  buildRoundBoxes();
  loadRound(0);
}

// ─── SHARE ────────────────────────────────────────────────────────────────────
function buildShareCanvas() {
  const W = 540, H = 960;
  const cv  = document.createElement('canvas');
  cv.width  = W; cv.height = H;
  const ctx = cv.getContext('2d');

  const cs    = getComputedStyle(document.documentElement);
  const bg    = cs.getPropertyValue('--scene-bg').trim()    || '#F5F5F5';
  const ink   = cs.getPropertyValue('--scene-color').trim() || '#1E1E1E';
  const GREEN = '#14AE5C', BLUE = '#0D99FF', RED = '#F24822';

  const total   = scores.reduce((a, b) => a + b, 0);
  const rounded = Math.round(total * 10) / 10;
  const verdict = document.getElementById('finalVerdict').textContent;

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Dot grid
  ctx.fillStyle = ink;
  ctx.globalAlpha = 0.07;
  for (let x = 20; x < W; x += 20)
    for (let y = 20; y < H; y += 20) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
    }
  ctx.globalAlpha = 1;

  const sep = () => {
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = ink; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(56, 0); ctx.lineTo(W - 56, 0); ctx.stroke();
    ctx.globalAlpha = 1;
  };

  // TYPE DUAL
  ctx.globalAlpha = 0.35; ctx.fillStyle = ink;
  ctx.font = '400 13px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TYPE DUAL', W / 2, 90);

  // Game name
  ctx.globalAlpha = 1; ctx.fillStyle = ink;
  ctx.font = '700 80px "Playfair Display", serif';
  ctx.fillText('Snap', W / 2, 185);

  // Separator 1
  ctx.save(); ctx.translate(0, 230); sep(); ctx.restore();

  // Score
  const scoreColor = rounded >= 40 ? GREEN : rounded >= 25 ? ink : RED;
  ctx.globalAlpha = 1; ctx.fillStyle = scoreColor;
  ctx.font = '300 112px "DM Mono", monospace';
  ctx.fillText(rounded.toFixed(1), W / 2, 365);

  // Denom
  ctx.globalAlpha = 0.4; ctx.fillStyle = ink;
  ctx.font = '400 17px "DM Mono", monospace';
  ctx.fillText('/ 50.0 points', W / 2, 405);

  // Verdict
  ctx.globalAlpha = 1; ctx.fillStyle = ink;
  ctx.font = 'italic 400 26px "Playfair Display", serif';
  ctx.fillText(verdict, W / 2, 470);

  // Separator 2
  ctx.save(); ctx.translate(0, 510); sep(); ctx.restore();

  // Round breakdown
  const PAD = 56, barMax = W - PAD * 2 - 72, barH = 8, rowH = 52;
  scores.forEach((s, i) => {
    const y  = 538 + i * rowH;
    const bc = s >= 8 ? GREEN : s >= 5 ? BLUE : RED;

    ctx.globalAlpha = 0.4; ctx.fillStyle = ink;
    ctx.font = '400 12px "DM Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('F' + (i + 1), PAD, y + barH);

    ctx.globalAlpha = 0.12; ctx.fillStyle = ink;
    ctx.fillRect(PAD + 28, y, barMax, barH);

    ctx.globalAlpha = 1; ctx.fillStyle = bc;
    ctx.fillRect(PAD + 28, y, (s / 10) * barMax, barH);

    ctx.fillStyle = bc;
    ctx.font = '400 13px "DM Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(s.toFixed(1), W - PAD, y + barH);
  });

  // URL
  ctx.globalAlpha = 0.25; ctx.fillStyle = ink;
  ctx.font = '400 14px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('typedual.com', W / 2, H - 52);

  return cv;
}

async function shareResult() {
  const btn = document.getElementById('shareBtn');
  btn.disabled = true;
  btn.textContent = '...';

  const cv = buildShareCanvas();
  cv.toBlob(async blob => {
    const file = new File([blob], 'snap-typedual.png', { type: 'image/png' });
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Snap · Type Dual' });
      } else {
        throw new Error('no share');
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        const a = document.createElement('a');
        a.href = cv.toDataURL('image/png');
        a.download = 'snap-typedual.png';
        a.click();
      }
    }
    btn.disabled = false;
    btn.textContent = 'Share';
  }, 'image/png');
}
</script>
